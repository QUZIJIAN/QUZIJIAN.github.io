<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>如何培养认真严谨的习惯</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #fff;
            margin: 0;
            padding: 0;
        }
        .card {
            background-color: #fff;
            width: 100%;
            padding: 20px 30px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .banner-img {
            flex-shrink: 0;
        }
        .banner-img img {
            display: block;
        }

        .content {
            flex-grow: 1;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin: 0 0 10px 0;
        }
        .title .gray-text {
            color: #666; 
        }
        .title .blue-text {
            color: #3377bb; 
        }

        .meta-info {
            font-size: 12px;
            color: #333;
            text-align: center;
            margin-bottom: 15px;
        }
        .meta-info .blue-text {
            color: #3377bb;
        }
        .list {
            font-size: 14px;
            line-height: 1.8;
            color: #333;
        }
        .list p {
            margin: 6px 0;
        }
        .list .red-highlight {
            color: #dd3333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="banner-img">
            <img src="图.jpg" 态度决定一切，细节决定成败">
        </div>
        <div class="content">
            <h2 class="title">
                <span class="gray-text">如何培养</span>
                <span class="blue-text">认真严谨</span>
                <span class="gray-text">的习惯</span>
            </h2>
            <div class="meta-info">
                时间:<span class="blue-text">2022年02月21日17时26分</span> &nbsp;
                来源:<span class="blue-text">思政教育</span>
            </div>
            <div class="list">
                <p>◆ <span class="red-highlight">反复确认</span>，做任何事情都要照顾到每一个细节并反复确认，<span class="red-highlight">要有一种能在脑子里“虚拟”整个事件过程的能力</span>，确保所有的节点都正常。</p>
                <p>◆ 想尽办法<span class="red-highlight">努力让不可能变为可能</span>只有用尽全力做了，才算是努力</p>
                <p>◆ 结果导向<span class="red-highlight">一切以结果为导向，任何事情都是你的名片。</span>还要思考你的结果和过程是否满足所有和你配合的人的需求，</p>
                <p>◆ 学会假设<span class="red-highlight">了解周围比你强的人，观察他们的做事方法。</span>遇到让自己束手无策的时候，把自己虚拟成他的样子，想想他会怎么做</p>
            </div>
        </div>
    </div>
</body>
</html>
