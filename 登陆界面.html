<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网上书城 - 注册新用户</title>
    <style>
        body {
            background: #f5f5f5;
            font-family: "微软雅黑", sans-serif;
        }
        .box {
            width: 420px;
            margin: 80px auto;
            border: 1px solid #ccc;
        }
        .top-title {
            height: 40px;
            line-height: 40px;
            background: #666;
            color: #fff;
            text-align: center;
            font-size: 16px;
        }
        .reg-title {
            height: 32px;
            line-height: 32px;
            background: #e8e8e8;
            padding-left: 20px;
            border-bottom: 1px solid #ccc;
        }
        form {
            padding: 20px;
            background: #eee;
        }
        .item {
            margin: 12px 0;
            display: flex;
            align-items: center;
        }
        .item label {
            width: 80px;
            font-size: 13px;
        }
        .item input {
            flex: 1;
            height: 24px;
            border: 1px solid #999;
        }
        .submit-btn {
            width: 100%;
            height: 30px;
            background: #666;
            color: white;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="top-title">网上书城</div>
        <div class="reg-title">注册新用户</div>
        <form action="#" method="post">
            <div class="item">
                <label> 用户名</label>
                <input type="text" name="username">
            </div>
            <div class="item">
                <label> 密码</label>
                <input type="password" name="pwd">
            </div>
            <div class="item">
                <label> 确认密码</label>
                <input type="password" name="repwd">
            </div>
            <div class="item">
                <label>电子邮件</label>
                <input type="email" name="email">
            </div>
            <input class="submit-btn" type="submit" value="注册新用户">
        </form>
    </div>
</body>
</html>
