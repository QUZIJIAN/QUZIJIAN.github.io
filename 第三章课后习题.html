<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频播放器图标</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #021b30 0%, #067380 100%);
        }

        .card {
            width: 400px;
            height: 400px;
            border-radius: 32px;
            background: linear-gradient(135deg, #884488 0%, #663377 100%);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player {
            width: 280px;
            height: 200px;
            border-radius: 24px;
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .player-screen {
            width: 100%;
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(135deg, #ffcc99 0%, #cc6666 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-button {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .play-button:hover {
            transform: scale(1.05);
        }
        .play-triangle {
            width: 0;
            height: 0;
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-left: 40px solid #3fbd0dce;
            margin-left: 8px; 
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="player">
            <div class="player-screen">
                <div class="play-button">
                    <div class="play-triangle"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
